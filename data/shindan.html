// ─── スコアリング ───
function calcResult(answers) {
  const score = { L:0,K:0,A:0,L1:0,L2:0,K1:0,K2:0,A1:0,A2:0 };
  for (const q of QUESTIONS) {
    const key = answers[q.id];
    if (!key) continue;
    const choice = q.choices.find(c => c.key === key);
    if (!choice) continue;
    for (const [type, pt] of Object.entries(choice.scores)) score[type] += pt;
  }

  // 大分類
  let mainType = maxKey({ L:score.L, K:score.K, A:score.A });
  const mainTied = topTied({ L:score.L, K:score.K, A:score.A });
  if (mainTied.length > 1) mainType = resolveMainTie(answers, mainTied);

  // サブタイプ
  const subScores = mainType === 'L' ? { L1:score.L1, L2:score.L2 }
                  : mainType === 'K' ? { K1:score.K1, K2:score.K2 }
                  :                    { A1:score.A1, A2:score.A2 };
  let subType = maxKey(subScores);
  const subTied = topTied(subScores);
  if (subTied.length > 1) subType = resolveSubTie(mainType, answers, subTied);

  return subType;
}

function resolveMainTie(answers, tiedTypes) {
  const MAP = { A:'L', B:'K', C:'A' };
  for (const qid of ['Q9','Q7','Q1']) {
    const mapped = MAP[answers[qid]];
    if (mapped && tiedTypes.includes(mapped)) return mapped;
  }
  return tiedTypes[0];
}

function resolveSubTie(mainType, answers, tiedSubs) {
  const PRIORITY = { L:['Q4','Q6','Q8'], K:['Q4','Q6','Q8'], A:['Q4','Q6','Q5'] };
  const MAP = { L:{A:'L1',B:'L2',C:'L2'}, K:{A:'K1',B:'K2',C:'K2'}, A:{A:'A1',B:'A2',C:'A2'} };
  for (const qid of PRIORITY[mainType]) {
    const mapped = MAP[mainType][answers[qid]];
    if (mapped && tiedSubs.includes(mapped)) return mapped;
  }
  return tiedSubs[0];
}

function maxKey(obj) {
  return Object.entries(obj).sort((a,b) => b[1]-a[1])[0][0];
}
function topTied(obj) {
  const max = Math.max(...Object.values(obj));
  return Object.keys(obj).filter(k => obj[k] === max);
}

let currentIndex = 0;
let answers = {};
let transitioning = false;

function startQuiz() {
  document.getElementById('screen-top').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderQuestion(0);
}

function goBack() {
  if (transitioning) return;
  if (currentIndex === 0) {
    // Q1 → TOP に戻る
    document.getElementById('screen-quiz').style.display = 'none';
    document.getElementById('qWrap').innerHTML = '';
    answers = {};
    document.getElementById('screen-top').style.display = 'flex';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    // 前の質問に戻る
    transitioning = true;
    const active = document.querySelector('.q-card.active');
    if (active) {
      active.style.transition = 'opacity .25s ease, transform .25s ease';
      active.style.opacity = '0';
      active.style.transform = 'translateX(48px)';
      setTimeout(() => {
        active.remove();
        currentIndex--;
        // 直前の回答を削除
        delete answers[QUESTIONS[currentIndex].id];
        renderQuestion(currentIndex);
        transitioning = false;
      }, 250);
    } else {
      transitioning = false;
    }
  }
}

function goBackToQuiz() {
  // 結果画面 → Q9（最後の質問）に戻る
  ['card1','card2','card3','ctaCard'].forEach(id =>
    document.getElementById(id).classList.remove('visible'));
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  currentIndex = QUESTIONS.length - 1;
  delete answers[QUESTIONS[currentIndex].id];
  document.getElementById('qWrap').innerHTML = '';
  renderQuestion(currentIndex);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestion(index) {
  updateProgress(index + 1, QUESTIONS.length);
  const q = QUESTIONS[index];
  const wrap = document.getElementById('qWrap');
  const card = document.createElement('div');
  card.className = 'q-card';
  card.innerHTML = `
    <div class="q-tag">Q${index + 1} / ${QUESTIONS.length}</div>
    <div class="q-text">${q.text}</div>
    <div class="choices">
      ${q.choices.map(c => `
        <button class="choice" onclick="answer('${q.id}','${c.key}',this)">
          <div class="choice-label">${c.key}</div>
          <span>${c.label}</span>
        </button>`).join('')}
    </div>`;
  wrap.appendChild(card);
  requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('active')));
}

function answer(qid, key, btn) {
  if (transitioning) return;
  transitioning = true;
  answers[qid] = key;
  btn.classList.add('selecting');
  setTimeout(() => {
    const active = document.querySelector('.q-card.active');
    if (active) active.classList.add('exit-left');
    setTimeout(() => {
      if (active) active.remove();
      currentIndex++;
      if (currentIndex < QUESTIONS.length) {
        renderQuestion(currentIndex);
      } else {
        showResult();
      }
      transitioning = false;
    }, 350);
  }, 200);
}

  document.getElementById('stepNum').textContent = `${current} / ${total}`;
  document.getElementById('progressFill').style.width = ((current - 1) / total * 100) + '%';
}

      `<div class="priority-item">
        <div class="priority-rank">${p.rank}</div>
        <div class="priority-text">${p.text}</div>
      </div>`).join('')}</div>`;

  // CTA
  document.getElementById('ctaTitle').textContent = d.ctaTitle;
  document.getElementById('ctaDesc').textContent = d.ctaDesc;
  document.getElementById('noteChapters').innerHTML = d.chapters.map((c, i) =>
    `<div class="note-chapter ${i + 1 === d.highlightChapter ? 'highlight' : ''}">
      <div class="ch-num">${i + 1}</div>
      <span>${i + 1 === d.highlightChapter ? '▶ ' : ''}第${i+1}章：${c}</span>
    </div>`).join('');

  const url = NOTE_URLS[d.noteKey];
  const ctaBtn = document.getElementById('ctaBtn');
  if (url) {
    ctaBtn.href = url;
    ctaBtn.textContent = '詳しい改善法を読む →';
  } else {
    ctaBtn.removeAttribute('href');
    ctaBtn.style.background = '#333';
    ctaBtn.style.color = '#888';
    ctaBtn.textContent = '近日公開予定';
    ctaBtn.style.cursor = 'default';
  }

  // アニメ
  setTimeout(() => {
    ['card1','card2','card3'].forEach((id, i) => {
      setTimeout(() => document.getElementById(id).classList.add('visible'), i * 160);
    });
    setTimeout(() => document.getElementById('ctaCard').classList.add('visible'), 550);
  }, 100);
}

function retry() {
  currentIndex = 0; answers = {}; transitioning = false;
  document.getElementById('qWrap').innerHTML = '';
  ['card1','card2','card3','ctaCard'].forEach(id =>
    document.getElementById(id).classList.remove('visible'));
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-top').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
